<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Qooentum — Medimos el flujo de gente en comercios</title>

<!-- ── PWA: manifest + icons + theme ── -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#00C48C">
<meta name="description" content="Mapa en tiempo real de filas y ocupación en comercios cerca tuyo.">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16.png">
<link rel="icon" type="image/x-icon" href="./icons/favicon.ico">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FilaCero">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..900;1,14..32,300..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green:#00C48C; --green-lt:#E8FBF5; --green-dk:#009E72;
  --yellow:#F59E0B; --yellow-lt:#FFFBEB;
  --orange:#F97316; --orange-lt:#FFF7ED;
  --red:#EF4444; --red-lt:#FEF2F2;
  --blue:#6366F1; --blue-lt:#EEF2FF;
  --bg:#F0F4F8; --surface:#FFFFFF; --surface2:#F1F5F9;
  --border:#E2E8F0; --border2:#CBD5E1;
  --text:#0F172A; --text2:#64748B; --text3:#94A3B8;
  --radius:10px; --radius-lg:16px; --radius-xl:22px;
  --shadow-sm:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --shadow:0 4px 16px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.04);
  --shadow-lg:0 12px 40px rgba(15,23,42,.12),0 4px 12px rgba(15,23,42,.06);
  --shadow-float:0 8px 32px rgba(15,23,42,.18),0 2px 8px rgba(15,23,42,.10);
  --font-base:15px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:var(--font-base);line-height:1.5;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;height:100dvh;max-width:1200px;margin:0 auto;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:14px;padding:0 18px;height:60px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(226,232,240,.7);flex-shrink:0;z-index:100;}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:-.6px;white-space:nowrap;color:var(--text);text-decoration:none;}
.brand-mark{width:78px;height:26px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,196,140,.35);overflow:hidden;}
.brand-mark img{width:100%;height:100%;object-fit:cover;}
.brand span em{color:var(--green);font-style:normal;}

.cbar-wrap{flex:1;max-width:300px;}
.cbar-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:5px;font-weight:600;letter-spacing:.1px;}
.cbar-track{height:6px;border-radius:99px;position:relative;overflow:visible;background:linear-gradient(to right,#00C48C 0%,#6EE7C4 28%,#F59E0B 54%,#F97316 76%,#EF4444 100%);}
.cbar-overlay{position:absolute;right:0;top:0;height:100%;background:rgba(240,244,248,.82);border-radius:0 99px 99px 0;transition:width 1.4s cubic-bezier(.34,1.56,.64,1);}
.cbar-needle{position:absolute;top:-5px;width:3px;height:16px;background:var(--text);border-radius:99px;transform:translateX(-50%);transition:left 1.4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 0 3px rgba(255,255,255,.8);}
@keyframes needle-pulse{0%,100%{opacity:1;box-shadow:0 0 0 3px rgba(255,255,255,.8)}50%{opacity:.5;box-shadow:0 0 0 4px rgba(239,68,68,.25)}}

.user-chip{display:flex;align-items:center;gap:9px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:4px 14px 4px 4px;transition:all .25s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:var(--shadow-sm);}
.user-chip:hover{border-color:var(--green);background:var(--green-lt);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,196,140,.18);}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#00C48C,#00A87A);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;box-shadow:0 2px 6px rgba(0,196,140,.3);overflow:hidden;flex-shrink:0;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.user-chip-info{min-width:74px;}
.pts-row{display:flex;align-items:center;gap:5px;}
.lvl-badge{font-size:10px;font-weight:900;color:#fff;background:linear-gradient(135deg,#A855F7,#6366F1);padding:1px 7px;border-radius:6px;letter-spacing:.3px;box-shadow:0 0 8px rgba(168,85,247,.45);}
.pts-label{font-size:13px;font-weight:800;color:var(--green);line-height:1.2;}
.xp-bar-bg{height:4px;background:var(--surface2);border-radius:99px;margin-top:3px;overflow:hidden;border:1px solid var(--border);}
.xp-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#00C48C,#22D3EE);box-shadow:0 0 6px rgba(34,211,238,.6);transition:width .6s cubic-bezier(.34,1.1,.64,1);}

.login-topbar-btn{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#00C48C,#009E72);color:#fff;border:none;border-radius:99px;padding:8px 17px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap;box-shadow:0 3px 10px rgba(0,196,140,.3);transition:all .2s;font-family:inherit;}
.login-topbar-btn:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(0,196,140,.4);}
@keyframes spin{to{transform:rotate(360deg)}}
.gbtn-spinner{width:13px;height:13px;border-radius:50%;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;animation:spin .7s linear infinite;display:none;flex-shrink:0;}
.login-topbar-btn.is-loading .gbtn-spinner{display:inline-block;}
.login-topbar-btn.is-loading .gicon{display:none;}

/* ── PANELS ── */
.panel{display:none;flex:1;min-height:0;overflow:hidden;}
.panel.visible{display:flex;flex-direction:column;animation:panelIn .28s cubic-bezier(.34,1.2,.64,1);}
@keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#panel-map{flex-direction:row !important;animation:none;}
.map-pane{position:relative;flex:1;overflow:hidden;min-width:0;}
#leaflet-map{width:100%;height:100%;z-index:1;}

/* ── LEAFLET ── */
.leaflet-popup-content-wrapper{border-radius:14px !important;border:1px solid var(--border) !important;padding:0 !important;box-shadow:var(--shadow-lg) !important;}
.leaflet-popup-content{margin:0 !important;}
.leaflet-popup-tip-container{display:none;}
.leaflet-control-zoom{border:1px solid var(--border) !important;border-radius:12px !important;overflow:hidden;box-shadow:var(--shadow) !important;}
.leaflet-control-zoom a{color:var(--text2) !important;font-size:17px !important;font-weight:700 !important;line-height:32px !important;width:32px !important;height:32px !important;}
.leaflet-control-zoom a:hover{color:var(--green) !important;background:var(--green-lt) !important;}

/* ── FLOATING CONTROLS ── */
.map-float-controls{position:absolute;top:14px;right:14px;z-index:999;display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
.map-refresh-btn{background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:7px 13px;font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow-float);}
.map-refresh-btn:hover{border-color:var(--green);color:var(--green);transform:translateY(-1px);}
.gps-float-btn{width:42px;height:42px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--shadow-float);}
.gps-float-btn:hover{border-color:var(--blue);background:var(--blue-lt);transform:translateY(-2px) scale(1.06);}
.gps-float-btn svg{width:18px;height:18px;color:var(--blue);}
.gps-float-btn.pulsing{animation:gpsPulse .8s ease-in-out infinite;}
@keyframes gpsPulse{0%,100%{box-shadow:var(--shadow-float)}50%{box-shadow:0 0 0 6px rgba(99,102,241,.18),var(--shadow-float)}}
@keyframes rotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* ── AD BANNER ── */
.ad-banner{position:absolute;bottom:14px;left:14px;z-index:999;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:16px;padding:13px 15px 11px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);max-width:295px;cursor:pointer;transition:all .2s;animation:adSlideIn .5s cubic-bezier(.34,1.56,.64,1);}
.ad-banner:hover{transform:translateY(-2px);}
@keyframes adSlideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.ad-label{position:absolute;top:-9px;left:12px;background:var(--text3);color:#fff;font-size:9px;font-weight:800;padding:2px 8px;border-radius:99px;letter-spacing:.8px;text-transform:uppercase;}
.ad-logo{width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#FF6B6B,#FF8E53);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ad-body{flex:1;min-width:0;}
.ad-title{font-size:13px;font-weight:800;color:var(--text);line-height:1.3;}
.ad-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.ad-cta{background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;border:none;border-radius:9px;padding:7px 12px;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;font-family:inherit;}
.ad-close{position:absolute;top:6px;right:9px;background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer;line-height:1;padding:2px 4px;}

/* ── MAP MARKER CARDS ── */
.fc-card-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;filter:drop-shadow(0 3px 10px rgba(15,23,42,.16));transition:transform .18s cubic-bezier(.34,1.56,.64,1),filter .18s;}
.fc-card-wrap:hover{transform:scale(1.05) translateY(-2px);filter:drop-shadow(0 7px 18px rgba(15,23,42,.22));}
.fc-card-wrap.is-active{filter:drop-shadow(0 6px 20px rgba(0,196,140,.38));}
.fc-card{width:175px;background:rgba(255,255,255,.98);border:1.5px solid var(--border);border-radius:13px;padding:9px 10px 8px;font-family:'Inter',system-ui,sans-serif;text-align:left;backdrop-filter:blur(8px);}
.fc-card-wrap.is-active .fc-card{border-color:var(--green);border-width:2px;box-shadow:0 0 0 3px rgba(0,196,140,.14);}
.fc-card-head{display:flex;gap:7px;align-items:center;}
.fc-card-logo{width:30px;height:30px;border-radius:9px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;position:relative;}
.fc-card-verified{position:absolute;bottom:-3px;right:-3px;width:12px;height:12px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;font-size:7px;color:#fff;font-weight:900;line-height:1;}
.fc-card-info{flex:1;min-width:0;}
.fc-card-name{font-size:12px;font-weight:800;color:var(--text);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fc-card-type{font-size:10px;color:var(--text3);font-weight:500;margin-top:1px;}
.fc-card-open{font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;flex-shrink:0;}
.fc-card-open.open{background:var(--green-lt);color:var(--green-dk);}
.fc-card-open.closed{background:var(--red-lt);color:var(--red);}
.fc-card-status{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;margin-top:7px;}
.fc-card-status .s-dot-sm{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.5);}
.fc-card-status .s-label-sm{font-size:10px;font-weight:700;color:#fff;line-height:1.2;}
.fc-tail{width:2px;height:6px;background:#CBD5E1;}
.fc-base{width:6px;height:6px;border-radius:50%;background:#CBD5E1;}

/* ── FLOATING NAV PILL ── */
.bottom-nav{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:600;display:flex;align-items:center;gap:4px;background:rgba(15,23,42,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.10);border-radius:99px;padding:6px 6px;box-shadow:var(--shadow-float),0 0 0 1px rgba(255,255,255,.06) inset;animation:navAppear .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes navAppear{from{opacity:0;transform:translateX(-50%) translateY(16px) scale(.92)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.nav-btn{display:flex;align-items:center;gap:7px;padding:9px 18px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:rgba(255,255,255,.55);border-radius:99px;transition:all .22s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;font-family:inherit;letter-spacing:-.1px;position:relative;}
.nav-btn svg{width:17px;height:17px;transition:transform .22s cubic-bezier(.34,1.56,.64,1);}
.nav-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.07);}
.nav-btn.active{color:#fff;background:rgba(255,255,255,.14);font-weight:800;}
.nav-btn.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--green);border-radius:0 0 3px 3px;animation:tabIndicator .22s ease;}
@keyframes tabIndicator{from{width:0;opacity:0}to{width:20px;opacity:1}}

/* ── MODALS & TOASTS ── */
.levelup-modal{position:fixed;inset:0;background:rgba(15,23,42,.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:99998;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.levelup-card{background:linear-gradient(160deg,#1E1B4B,#312E81);border:2px solid #A855F7;border-radius:22px;padding:32px 36px;text-align:center;box-shadow:0 0 0 1px rgba(168,85,247,.4),0 20px 60px rgba(0,0,0,.45);animation:levelPop .45s cubic-bezier(.34,1.56,.64,1);max-width:270px;}
@keyframes levelPop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.levelup-burst{font-size:44px;animation:spinPulse 1.2s ease-in-out infinite;}
@keyframes spinPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.22)}}
.levelup-lvl{font-size:22px;font-weight:900;color:#fff;letter-spacing:1px;margin-top:9px;}
.levelup-title{font-size:13px;font-weight:700;color:#D8B4FE;margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
.levelup-close{margin-top:20px;background:linear-gradient(135deg,#A855F7,#7C3AED);color:#fff;border:none;border-radius:99px;padding:10px 26px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit;}

.achievement-toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-70px);background:linear-gradient(135deg,#1E293B,#0F172A);border:1.5px solid #F59E0B;border-radius:16px;padding:11px 20px;display:flex;align-items:center;gap:11px;box-shadow:0 0 0 1px rgba(245,158,11,.3),0 10px 30px rgba(0,0,0,.35);z-index:99997;opacity:0;transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;pointer-events:none;}
.achievement-toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.ach-icon{font-size:24px;flex-shrink:0;}
.ach-eyebrow{font-size:9px;font-weight:900;color:#F59E0B;letter-spacing:1.2px;}
.ach-label{font-size:13px;font-weight:800;color:#fff;}

/* ── RANKING ── */
.panel-header{padding:15px 19px;font-size:15px;font-weight:800;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;background:var(--surface);flex-shrink:0;letter-spacing:-.3px;}
.panel-header-sub{font-size:12px;font-weight:500;color:var(--text3);margin-left:auto;}
.rank-list{flex:1;overflow-y:auto;background:var(--bg);}
.rank-list::-webkit-scrollbar{width:4px;}
.rank-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
.rank-row{display:flex;align-items:center;gap:13px;padding:12px 19px;border-bottom:1px solid var(--border);background:var(--surface);transition:all .18s;animation:rowIn .3s ease both;}
@keyframes rowIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.rank-row:hover{background:var(--surface2);padding-left:23px;}
.rank-row.is-me{background:var(--green-lt);border-left:3px solid var(--green);}
.rank-pos{min-width:30px;font-size:17px;font-weight:900;text-align:center;color:var(--text2);}
.rank-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:14px;font-weight:700;color:var(--text);}
.rank-sub{font-size:12px;color:var(--text2);}
.rank-pts-val{font-size:15px;font-weight:900;color:var(--green);letter-spacing:-.3px;}

/* ── PRIZES ── */
.prizes-header-note{padding:11px 15px;background:linear-gradient(135deg,var(--green-lt),#D1FAF0);border-bottom:1px solid rgba(0,196,140,.2);font-size:12px;font-weight:600;color:var(--green-dk);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.prizes-list{flex:1;overflow-y:auto;background:var(--bg);padding:13px 15px;display:flex;flex-direction:column;gap:10px;}
.prize-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:15px;display:flex;align-items:center;gap:13px;transition:all .22s cubic-bezier(.34,1.56,.64,1);animation:rowIn .3s ease both;box-shadow:var(--shadow-sm);}
.prize-row:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.prize-emoji{font-size:30px;width:44px;text-align:center;flex-shrink:0;}
.prize-body{flex:1;min-width:0;}
.prize-name{font-size:14px;font-weight:700;color:var(--text);}
.prize-cat{font-size:11px;color:var(--text2);margin-top:1px;font-weight:500;}
.pbar-bg{height:4px;background:var(--surface2);border-radius:99px;margin-top:8px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#00C48C,#00D4A0);transition:width .9s cubic-bezier(.34,1.1,.64,1);}
.prize-cta{font-size:11px;font-weight:800;padding:7px 13px;border-radius:99px;white-space:nowrap;transition:all .22s cubic-bezier(.34,1.56,.64,1);}
.prize-cta.can{background:linear-gradient(135deg,#00C48C,#009E72);color:#fff;cursor:pointer;}
.prize-cta.can:hover{transform:translateY(-1px);}
.prize-cta.cant{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;border-radius:99px;padding:10px 22px;font-size:13px;font-weight:700;opacity:0;transition:opacity .28s,transform .28s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:6px;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes ptsFlash{0%{transform:scale(1)}30%{transform:scale(1.22);color:var(--green)}100%{transform:scale(1)}}
.pts-flash{animation:ptsFlash .45s cubic-bezier(.34,1.56,.64,1);}

/* ── REACT POPUP OVERLAY ── */
#react-popup-root{position:fixed;inset:0;z-index:10000;pointer-events:none;}
#react-popup-root.active{pointer-events:all;}

/* ── INSTALL PROMPT ── */
.install-banner{position:absolute;top:14px;left:14px;right:auto;z-index:999;background:rgba(15,23,42,.92);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:10px 12px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);max-width:260px;animation:adSlideIn .5s cubic-bezier(.34,1.56,.64,1);}

    setTimeout(onClose, 320);

    if (submitted) return;
    setSelectedVote(idx);

        /* close btn */
        React.createElement('button', {
          onClick: handleClose,
          style: { position:'absolute', top:12, right:12, width:32, height:32, borderRadius:'50%', background:'rgba(0,0,0,0.42)', border:'none', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:18, lineHeight:1, backdropFilter:'blur(8px)' }
        }, '✕'),

        /* status chip top-left */
        React.createElement('div', {
          style: { position:'absolute', top:12, left:12, background: s.color, borderRadius:99, padding:'4px 10px', display:'flex', alignItems:'center', gap:5 }
        },
          React.createElement('span', { style:{ width:6, height:6, borderRadius:'50%', background:'rgba(255,255,255,0.55)', display:'inline-block', flexShrink:0 } }),
          React.createElement('span', { style:{ fontSize:11, fontWeight:800, color:'#fff' } }, s.label)
        ),

        /* logo + name over photo */
        React.createElement('div', { style:{ position:'absolute', bottom:13, left:14, right:14, display:'flex', alignItems:'flex-end', gap:10 } },
          React.createElement('div', { style:{ position:'relative', flexShrink:0 } },
            React.createElement('div', { style:{ width:48, height:48, borderRadius:14, background:'#fff', border:'2.5px solid rgba(255,255,255,0.9)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:24 } }, place.logo),
            place.verified && React.createElement('div', { style:{ position:'absolute', bottom:-3, right:-3, width:17, height:17, background:'#6366F1', borderRadius:'50%', border:'2px solid #fff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:8, color:'#fff', fontWeight:900 } }, '✓')
          ),
          React.createElement('div', { style:{ flex:1, minWidth:0 } },
            React.createElement('p', { style:{ margin:0, fontSize:16, fontWeight:800, color:'#fff', lineHeight:1.2, textShadow:'0 1px 6px rgba(0,0,0,0.5)' } }, place.name),
            React.createElement('p', { style:{ margin:'3px 0 0', fontSize:12, color:'rgba(255,255,255,0.82)', textShadow:'0 1px 4px rgba(0,0,0,0.4)' } }, place.type + ' · ' + place.addr)
          ),
          React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:4, background:'rgba(255,255,255,0.18)', backdropFilter:'blur(8px)', border:'0.5px solid rgba(255,255,255,0.3)', borderRadius:99, padding:'4px 9px', flexShrink:0 } },
            React.createElement('span', { style:{ color:'#F59E0B', fontSize:12 } }, '★'),
            React.createElement('span', { style:{ fontSize:12, fontWeight:800, color:'#fff' } }, place.rating),
            React.createElement('span', { style:{ fontSize:11, color:'rgba(255,255,255,0.7)' } }, ' · ' + place.reviewsN)
          )
        )
      ),

      /* BOTTOM SECTION — 60% */
      React.createElement('div', { style:{ padding:'15px 15px 18px' } },

        /* mini stats */
        React.createElement('div', { style:{ display:'flex', gap:8, marginBottom:16 } },
          ...[
            { val: place.reporters, lbl: 'Reportes' },
            { val: WAIT[place.status], lbl: 'Espera' },
            { val: TREND[place.status], lbl: 'Tendencia' },
          ].map(({ val, lbl }) =>
            React.createElement('div', { key: lbl, style:{ flex:1, background:'#F1F5F9', borderRadius:10, padding:'9px 10px', textAlign:'center' } },
              React.createElement('p', { style:{ margin:0, fontSize:17, fontWeight:900, color:'#0F172A', letterSpacing:'-0.5px' } }, val),
              React.createElement('p', { style:{ margin:'2px 0 0', fontSize:10, color:'#64748B', textTransform:'uppercase', letterSpacing:'0.5px', fontWeight:600 } }, lbl)
            )
          )
        ),

        /* geo indicator */
        React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:7, marginBottom:12, padding:'8px 11px', background:'#E8FBF5', borderRadius:10, border:'1px solid #A8EDD8' } },
          React.createElement('span', { style:{ fontSize:14 } }, '📍'),
          React.createElement('span', { style:{ fontSize:12, fontWeight:700, color:'#007A59' } }, 'Estás cerca · podés reportar')
        ),

        /* vote label */
        React.createElement('p', { style:{ margin:'0 0 10px', fontSize:11, fontWeight:700, color:'#94A3B8', textTransform:'uppercase', letterSpacing:'0.8px' } }, '¿Cómo está ahora?'),

        /* vote buttons */
        !submitted && React.createElement('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:12 } },
          ...[
            { idx:0, label:'Poca gente',  pts:'+10', color:'#00C48C' },
            { idx:1, label:'Bastante',    pts:'+10', color:'#F59E0B' },
            { idx:2, label:'Mucha gente', pts:'+15', color:'#F97316' },
            { idx:3, label:'Colapsado',   pts:'+20', color:'#EF4444' },
          ].map(({ idx, label, pts, color }) => {
            const isSelected = selectedVote === idx;
            return React.createElement('button', {
              key: idx,
              onClick: () => handleVote(idx),
              style: {
                border: isSelected ? `2px solid ${color}` : '1.5px solid #E2E8F0',
                borderRadius: 10,
                background: isSelected ? color : '#fff',
                padding: '11px 10px',
                cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 7,
                fontSize: 12, fontWeight: 700,
                color: isSelected ? '#fff' : '#0F172A',
                textAlign: 'left', fontFamily: 'inherit',
                transition: 'all 0.18s cubic-bezier(0.34,1.56,0.64,1)',
                transform: isSelected ? 'translateY(-1px)' : 'none',
                boxShadow: isSelected ? `0 4px 12px ${color}44` : 'none',
              }
            },
              React.createElement('span', { style:{ width:9, height:9, borderRadius:'50%', background: isSelected ? 'rgba(255,255,255,0.55)' : color, display:'inline-block', flexShrink:0 } }),
              label,
              React.createElement('span', { style:{ marginLeft:'auto', fontSize:10, fontWeight:800, color:'#fff', background: color, padding:'2px 7px', borderRadius:99 } }, pts)
            );
          })
        ),

        /* success state */
        submitted && React.createElement('div', {
          style:{ display:'flex', alignItems:'center', gap:10, background:'#E8FBF5', border:'1px solid #A8EDD8', borderRadius:12, padding:'13px 14px', marginBottom:12,
            animation:'slideUp .3s cubic-bezier(0.34,1.56,0.64,1)' }
        },
          React.createElement('span', { style:{ fontSize:22 } }, '✅'),
          React.createElement('div', null,
            React.createElement('p', { style:{ margin:0, fontSize:14, fontWeight:800, color:'#007A59' } }, '¡Reporte enviado!'),
            React.createElement('p', { style:{ margin:'2px 0 0', fontSize:12, color:'#047857' } }, `+${VOTE_PTS[selectedVote] || 10} puntos sumados a tu cuenta`)
          )
        ),

        /* submit button */
        !submitted && React.createElement('button', {
          onClick: handleSubmit,
          disabled: selectedVote === null,
          style: {
            width: '100%',
            background: selectedVote !== null
              ? `linear-gradient(135deg, ${STATUS_CFG[selectedVote].color}, ${STATUS_CFG[selectedVote].color}cc)`
              : '#E2E8F0',
            color: selectedVote !== null ? '#fff' : '#94A3B8',
            border: 'none', borderRadius: 12, padding: '14px',
            fontSize: 14, fontWeight: 800, cursor: selectedVote !== null ? 'pointer' : 'not-allowed',
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
            fontFamily: 'inherit',
            transition: 'all 0.22s cubic-bezier(0.34,1.56,0.64,1)',
            boxShadow: selectedVote !== null ? `0 6px 20px ${STATUS_CFG[selectedVote].color}44` : 'none',
            transform: selectedVote !== null ? 'translateY(-1px)' : 'none',
          }
        },
          React.createElement('svg', { viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2.5, strokeLinecap:'round', strokeLinejoin:'round', style:{ width:15, height:15 } },
            React.createElement('line', { x1:22, y1:2, x2:11, y2:13 }),
            React.createElement('polygon', { points:'22 2 15 22 11 13 2 9 22 2' })
          ),
          'Reportar estado'
        ),

        /* reporters note */
        React.createElement('p', { style:{ margin:'10px 0 0', fontSize:11, color:'#94A3B8', display:'flex', alignItems:'center', gap:5, fontWeight:500 } },
          React.createElement('svg', { viewBox:'0 0 24 24', fill:'none', stroke:'currentColor', strokeWidth:2, strokeLinecap:'round', strokeLinejoin:'round', style:{ width:12, height:12, flexShrink:0 } },
            React.createElement('path', { d:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2' }),
            React.createElement('circle', { cx:9, cy:7, r:4 }),
            React.createElement('path', { d:'M23 21v-2a4 4 0 0 0-3-3.87' }),
            React.createElement('path', { d:'M16 3.13a4 4 0 0 1 0 7.75' })
          ),
          `${place.reporters} reportes en las últimas 2h`
        )
      )
    )
  );
}

/* ─────────────── POPUP MANAGER ─────────────── */
let popupRoot = null;
let currentPopupPlace = null;

function openPlacePopup(place) {
  currentPopupPlace = place;
  const container = document.getElementById('react-popup-root');
  container.classList.add('active');
  if (!popupRoot) popupRoot = ReactDOM.createRoot(container);
  renderPopup(place);
}

function renderPopup(place) {
  popupRoot.render(
    React.createElement(PlacePopup, {
      place,
      onClose: closePopup,
      onVoteSubmit: handlePopupVoteSubmit,
    })
  );
}

function closePopup() {
  const container = document.getElementById('react-popup-root');
  container.classList.remove('active');
  if (popupRoot) popupRoot.render(null);
  currentPopupPlace = null;
}

function handlePopupVoteSubmit(placeId, voteIdx) {
  const p = places.find(x => x.id === placeId);
  if (!p) return;
  const pts = VOTE_PTS[voteIdx];
  p.status = voteIdx;
  p.reporters += 1;
  voteCount++;
  refreshMarkerIcon(p.id);
  updateCrowdBar(calcCrowdPct());
  addPoints(pts);
  showToast(`🎉 +${pts} puntos ganados`);
}

/* ─────────────── MAP ─────────────── */
function getLevelInfo(pts) {
  const level = Math.floor(pts / XP_PER_LEVEL) + 1;
  const xpIntoLevel = pts % XP_PER_LEVEL;
  return { level, xpIntoLevel, pct: Math.round((xpIntoLevel / XP_PER_LEVEL) * 100) };
}
function titleForLevel(level) { return LEVEL_TITLES[Math.min(level - 1, LEVEL_TITLES.length - 1)]; }

function addPoints(amount) {
  const prevLevel = getLevelInfo(userPts).level;
  userPts += amount;
  updateUserHUD();
  const ptsEl = document.getElementById('my-pts');
  if (ptsEl) { ptsEl.style.animation = 'none'; ptsEl.offsetHeight; ptsEl.style.animation = 'ptsFlash .45s cubic-bezier(.34,1.56,.64,1)'; }
  const newLevel = getLevelInfo(userPts).level;
  if (newLevel > prevLevel) setTimeout(() => levelUpCelebration(newLevel), 400);
}

function initMap() {
  leafletMap = L.map('leaflet-map', { center: [-34.6083, -58.3896], zoom: 14, zoomControl: true });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19 }).addTo(leafletMap);
  buildMapMarkers();

  /* auto-open popup for your hardcoded nearby place after map loads */
  setTimeout(() => {
    const nearby = places.find(p => p.id === 1);
    if (nearby) openPlacePopup(nearby);
  }, 800);
}

function makeStatusChipHTML(status) {
  const s = STATUS_CFG[status];
  return `<div class="fc-card-status" style="background:${s.color}"><div class="s-dot-sm"></div><div class="s-label-sm">${s.label}</div></div>`;
}

function makeIcon(place) {
  const verBadge = place.verified ? `<div class="fc-card-verified">✓</div>` : '';
  const html = `
    <div class="fc-card-wrap">
      <div class="fc-card">
        <div class="fc-card-head">
          <div class="fc-card-logo">${place.logo}${verBadge}</div>
          <div class="fc-card-info">
            <div class="fc-card-name">${place.name}</div>
            <div class="fc-card-type">${place.type}</div>
          </div>
          <span class="fc-card-open ${place.open ? 'open' : 'closed'}">${place.open ? 'Abierto' : 'Cerrado'}</span>
        </div>
        ${makeStatusChipHTML(place.status)}
      </div>
      <div class="fc-tail"></div>
      <div class="fc-base"></div>
    </div>`;
  return L.divIcon({ html, className: '', iconAnchor: [0, 168], popupAnchor: [0, -168] });
}

function buildMapMarkers() {
  Object.values(leafletMarkers).forEach(m => m.remove());
  leafletMarkers = {};
  places.forEach(p => {
    const marker = L.marker([p.lat, p.lng], { icon: makeIcon(p) }).addTo(leafletMap);
    marker.on('click', () => openPlacePopup(p));
    leafletMarkers[p.id] = marker;
  });
}

function refreshMarkerIcon(id) {
  const p = places.find(x => x.id === id);
  if (leafletMarkers[id]) leafletMarkers[id].setIcon(makeIcon(p));
}

function calcCrowdPct() {
  const avg = places.reduce((s, p) => s + p.status, 0) / places.length;
  return Math.round(10 + (avg / 3) * 82);
}

function updateCrowdBar(pct) {
  pct = Math.max(5, Math.min(95, pct));
  document.getElementById('cbar-needle').style.left = pct + '%';
  document.getElementById('cbar-overlay').style.width = (100 - pct) + '%';
  document.getElementById('cbar-pct').textContent = pct + '%';
}

function requestGpsPermission() {
  const btn = document.getElementById('gps-btn');
  btn.classList.add('pulsing');
  if (!navigator.geolocation) { showToast('⚠️ Tu navegador no soporta GPS'); btn.classList.remove('pulsing'); return; }
  navigator.geolocation.getCurrentPosition(
    () => { btn.classList.remove('pulsing'); showToast('📍 Ubicación activada'); },
    err => { btn.classList.remove('pulsing'); showToast(err.code === 1 ? '🔒 Permiso denegado' : '⚠️ No se pudo obtener ubicación'); },
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

function doGoogleLogin(btn) {
  if (isLoggedIn) return;
  if (btn) { btn.dataset.loading = '1'; btn.classList.add('is-loading'); const t = btn.querySelector('.gbtn-txt'); if (t) t.textContent = 'Conectando…'; }
  setTimeout(() => {
    isLoggedIn = true;
    document.getElementById('login-topbar-btn').style.display = 'none';
    document.getElementById('user-chip').style.display = 'flex';
    document.getElementById('topbar-avatar').innerHTML = `<div style="width:100%;height:100%;background:linear-gradient(135deg,#A855F7,#6366F1);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;">MG</div>`;
    updateUserHUD();
    showToast('👋 ¡Bienvenido a FilaCero!');
  }, 900);
}

function updateUserHUD() {
  const info = getLevelInfo(userPts);
  document.getElementById('my-pts').textContent = userPts + ' pts';
  document.getElementById('lvl-badge').textContent = 'LVL ' + info.level;
  document.getElementById('xp-bar-fill').style.width = info.pct + '%';
}

function levelUpCelebration(level) {
  const modal = document.createElement('div');
  modal.className = 'levelup-modal';
  modal.innerHTML = `<div class="levelup-card"><div class="levelup-burst">⭐</div><div class="levelup-lvl">¡NIVEL ${level}!</div><div class="levelup-title">${titleForLevel(level)}</div><button class="levelup-close" onclick="this.closest('.levelup-modal').remove()">¡Genial!</button></div>`;
  document.body.appendChild(modal);
  burstConfetti(modal.querySelector('.levelup-card'));
  setTimeout(() => { if (modal.parentNode) modal.remove(); }, 5000);
}

function burstConfetti(originEl) {
  if (!originEl) return;
  const rect = originEl.getBoundingClientRect();
  const emojis = ['🎉', '✨', '⭐', '🔥', '💥'];
  for (let i = 0; i < 16; i++) {
    const span = document.createElement('span');
    span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    span.style.cssText = `position:fixed;left:${rect.left + rect.width / 2}px;top:${rect.top + rect.height / 2}px;font-size:${14 + Math.random() * 12}px;pointer-events:none;z-index:99999;`;
    document.body.appendChild(span);
    const angle = Math.random() * Math.PI * 2, dist = 65 + Math.random() * 100;
    const dx = Math.cos(angle) * dist, dy = Math.sin(angle) * dist - 50;
    const anim = span.animate([{ transform: 'translate(0,0) scale(.6) rotate(0deg)', opacity: 1 }, { transform: `translate(${dx}px,${dy}px) scale(1.15) rotate(${Math.random() * 400}deg)`, opacity: 0 }], { duration: 750 + Math.random() * 400, easing: 'cubic-bezier(.2,.8,.3,1)' });
    anim.onfinish = () => span.remove();
    setTimeout(() => span.remove(), 1400);
  }
}

function manualRefresh() { countdown = 0; }

function doRefresh() {
  const icon = document.getElementById('refresh-icon');
  icon.style.animation = 'none'; icon.offsetHeight; icon.style.animation = 'rotate .7s cubic-bezier(.34,1.56,.64,1)';
  places.forEach(p => {
    if (Math.random() < .3) { p.status = Math.max(0, Math.min(3, p.status + (Math.random() > .5 ? 1 : -1))); refreshMarkerIcon(p.id); }
  });
  updateCrowdBar(calcCrowdPct());
  if (currentPopupPlace) {
    const updated = places.find(x => x.id === currentPopupPlace.id);
    if (updated) renderPopup(updated);
  }
}

setInterval(() => {
  countdown--;
  if (countdown <= 0) { countdown = 30; doRefresh(); }
  document.getElementById('refresh-txt').textContent = countdown + 's';
}, 1000);

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function buildRanking() {
  const sorted = [...RANKING_DATA].sort((a, b) => b.pts - a.pts);
  const medals = ['🥇', '🥈', '🥉'];
  document.getElementById('rank-list').innerHTML = sorted.map((u, i) =>
    `<div class="rank-row${u.isMe ? ' is-me' : ''}" style="animation-delay:${i * .04}s">
      <div class="rank-pos">${medals[i] || (i + 1)}</div>
      <div class="rank-avatar" style="background:${u.bg};color:${u.fg}">${u.init}</div>
      <div class="rank-info">
        <div class="rank-name">${u.name}${u.isMe ? ' <span style="font-size:11px;color:var(--green);font-weight:800">(vos)</span>' : ''}</div>
        <div class="rank-sub">${u.reports} reportes este mes</div>
      </div>
      <div class="rank-pts-val">${u.pts.toLocaleString('es-AR')}</div>
    </div>`
  ).join('');
}

function buildPrizes() {
  document.getElementById('my-pts-prizes').textContent = userPts + ' pts disponibles';
  document.getElementById('prizes-list').innerHTML = PRIZES_DATA.map((pr, idx) => {
    const can = userPts >= pr.pts, pct = Math.min(100, Math.round((userPts / pr.pts) * 100));
    return `<div class="prize-row" style="animation-delay:${idx * .04}s">
      <div class="prize-emoji">${pr.emoji}</div>
      <div class="prize-body">
        <div class="prize-name">${pr.name}</div>
        <div class="prize-cat">${pr.pts.toLocaleString('es-AR')} pts · ${pr.cat} · ${pr.partner}</div>
        <div class="pbar-bg"><div class="pbar-fill" style="width:0%" data-w="${pct}"></div></div>
      </div>
      <div class="prize-cta ${can ? 'can' : 'cant'}"${can ? ` onclick="redeemPrize(${idx})"` : ''}>${can ? 'Canjear' : 'Faltan ' + (pr.pts - userPts).toLocaleString('es-AR') + ' pts'}</div>
    </div>`;
  }).join('');
  requestAnimationFrame(() => { document.querySelectorAll('.pbar-fill').forEach(el => { el.style.width = el.dataset.w + '%'; }); });
}

function redeemPrize(idx) {
  const pr = PRIZES_DATA[idx];
  if (!pr || userPts < pr.pts) return;
  userPts -= pr.pts; updateUserHUD(); buildPrizes();
  showToast(`🎁 Canjeaste: ${pr.name}`);
}

function switchTab(tab) {
  ['map', 'ranking', 'prizes'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('visible', t === tab);
  });
  if (tab === 'ranking') buildRanking();
  if (tab === 'prizes') buildPrizes();
  if (tab === 'map' && leafletMap) setTimeout(() => leafletMap.invalidateSize(), 50);
}

window.addEventListener('DOMContentLoaded', () => {
  initMap();
  updateCrowdBar(calcCrowdPct());
  updateUserHUD();
});

/* ─────────────── PWA: SERVICE WORKER + INSTALL ─────────────── */
let deferredInstallPrompt = null;

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration failed:', err));
  });
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (!isStandalone) document.getElementById('install-banner').style.display = 'flex';
});

function installPwa() {
  document.getElementById('install-banner').style.display = 'none';
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(() => { deferredInstallPrompt = null; });
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
  showToast('✅ FilaCero instalada');
});
</script>
